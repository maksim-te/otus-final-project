apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: covid-processor
  namespace: spark
spec:
  type: Scala
  mode: cluster
  image: cr.yandex/crpeqnl53oh327o27qtu/spark/covid-processor:latest
  imagePullPolicy: Always
  mainClass: Main
  mainApplicationFile: local:///opt/custom_jars/CovidProcessor-assembly-1.0.0.jar
  sparkVersion: 3.5.6
  driver:
    labels:
      version: 3.5.6
    cores: 1
    memory: 1g
    serviceAccount: spark-operator-spark
    envFrom:
      - secretRef:
          name: clickhouse-credentials
  executor:
    labels:
      version: 3.5.6
    instances: 1
    cores: 2
    memory: 2g
    envFrom:
      - secretRef:
          name: clickhouse-credentials
